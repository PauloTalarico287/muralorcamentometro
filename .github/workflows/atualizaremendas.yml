name: Atualizar Emendas

on:
  schedule:
    # Roda todos os dias às 6h UTC (3h da manhã em Brasília)
    - cron: '0 6 * * *'
  workflow_dispatch:  # permite rodar manualmente

jobs:
  run-emendas:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Executar script de emendas
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_SPREADSHEET_KEY_EMENDAS: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_KEY_EMENDAS }}
        run: python emendas.py
