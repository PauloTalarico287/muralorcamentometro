name: Deploy Orçamentômetro

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Executa todos os dias às 9h e às 21h (UTC)
    # -> UTC-3 = 6h e 18h no horário de Brasília
    - cron: "0 9 * * *"
    - cron: "0 21 * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dev build-essential

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_SPREADSHEET_KEY: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_KEY }}
        run: python app.py
