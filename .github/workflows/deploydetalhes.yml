name: Detalhe Gastos - Automático

# Gatilhos
on:
  schedule:
    # Executa todo dia às 09:00 e 21:00 UTC
    # Ajuste o horário conforme seu fuso (São Paulo = UTC-3)
    - cron: '0 12 * * *'   # 09:00 BRT
    - cron: '0 0 * * *'    # 21:00 BRT
  workflow_dispatch:         # Permite rodar manualmente também

jobs:
  run-detalhe-gastos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar script DetalhesGastos
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_SPREADSHEET_KEY_DETALHES: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_KEY_DETALHES }}
        run: python detalhesgastos.py
